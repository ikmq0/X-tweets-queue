name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/x-scheduled-posting
            git pull origin main
            docker build -t x-bot-image .
            docker stop x-bot-container || true
            docker rm x-bot-container || true
            docker run -d \
              --name x-bot-container \
              -p 8000:8000 \
              -v $(pwd)/data:/app/data \
              --env-file .env \
              --restart unless-stopped \
              x-bot-image
