name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/X-tweets-queue
            git pull origin main
            docker build -t x-tweets-image .
            docker stop x-tweets-container || true
            docker rm x-tweets-container || true
            docker network create proxy-network || true
            docker run -d \
              --name x-tweets-container \
              --network proxy-network \
              -v $(pwd)/data:/app/data \
              --env-file .env \
              --restart unless-stopped \
              x-tweets-image
